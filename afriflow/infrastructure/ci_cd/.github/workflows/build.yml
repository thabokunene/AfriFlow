# =============================================================================
# @file build.yml
# @description GitHub Actions workflow that builds and pushes the AfriFlow
#              Docker image to the container registry on every push to main
#              or develop, and on pull requests targeting main. Uses Docker
#              layer caching via GitHub Actions cache to keep build times short.
# @author Thabo Kunene
# @created 2026-03-17
# =============================================================================

name: Build Docker Image

# ---------------------------------------------------------------------------
# TRIGGER CONDITIONS
# Build on pushes to primary branches and on PRs targeting main.
# Path filter ensures the workflow only runs when relevant files change.
# ---------------------------------------------------------------------------
on:
  push:
    branches: [ main, develop ]
    paths:
      - 'afriflow/**'                         # Any application code change triggers a rebuild
      - 'afriflow/infrastructure/ci_cd/Dockerfile'  # Dockerfile change always triggers rebuild
  pull_request:
    branches: [ main ]
    paths:
      - 'afriflow/**'
      - 'afriflow/infrastructure/ci_cd/Dockerfile'

jobs:
  # ---------------------------------------------------------------------------
  # JOB: build-and-push
  # Builds the multi-stage Docker image and pushes it to the registry.
  # On pull requests the push step is skipped (image is built but not published).
  # ---------------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest    # Use GitHub-hosted Ubuntu runner for Docker support

    steps:
      # 1. Check out repository source so the Dockerfile and application code are available
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Docker Buildx for advanced build features (multi-platform, cache export)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Authenticate with the container registry on pushes to main/develop.
      #    REGISTRY_USERNAME and REGISTRY_TOKEN are stored as GitHub repository secrets.
      #    On pull requests this step is skipped to avoid leaking credentials.
      - name: Log in to container registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io                              # GitHub Container Registry
          username: ${{ github.actor }}                  # GitHub username of the actor that triggered the run
          password: ${{ secrets.GITHUB_TOKEN }}          # Auto-provisioned token with write:packages scope

      # 4. Extract image metadata (tags and labels) based on branch name and commit SHA.
      #    This produces consistent, traceable image tags like:
      #      ghcr.io/<owner>/afriflow:main
      #      ghcr.io/<owner>/afriflow:sha-abc1234
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/afriflow
          tags: |
            type=ref,event=branch         # Tag with branch name (e.g. main, develop)
            type=sha,prefix=sha-          # Tag with short commit SHA for traceability

      # 5. Build the Docker image using the multi-stage Dockerfile.
      #    --cache-from / --cache-to use GitHub Actions cache to reuse unchanged layers.
      #    Push only on direct pushes (not on PRs) to avoid polluting the registry.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .                                          # Build context is the repo root
          file: afriflow/infrastructure/ci_cd/Dockerfile     # Path to the multi-stage Dockerfile
          push: ${{ github.event_name == 'push' }}           # Only push on branch pushes, not PRs
          tags: ${{ steps.meta.outputs.tags }}               # Tags from the metadata step above
          labels: ${{ steps.meta.outputs.labels }}           # OCI labels (org.opencontainers.image.*)
          cache-from: type=gha                               # Pull cached layers from GitHub Actions cache
          cache-to: type=gha,mode=max                        # Push all layers to cache for future runs
