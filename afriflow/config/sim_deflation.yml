# =============================================================================
# @file sim_deflation.yml
# @description SIM-to-employee deflation factors by country. Used to convert
#              raw active SIM counts from MTN network data into estimated
#              headcounts, accounting for the prevalence of multi-SIM usage
#              patterns in different African markets.
# @author Thabo Kunene
# @created 2026-03-19
# =============================================================================

# SIM Deflation Factors
#
# We use these factors to estimate client workforce size from
# active SIM card counts in the MTN domain.
#
# Formula: estimated_headcount = sim_count * deflation_factor
#
# Disclaimer: Portfolio project by Thabo Kunene. Not a
# Standard Bank Group product. All data is simulated.

country_factors:
  # South Africa: Lower multi-SIM ratio due to high contract penetration
  ZA:
    deflation_factor: 0.65
    multi_sim_ratio: 1.5
  
  # Nigeria: High multi-SIM ratio (2.8) due to network coverage gaps
  NG:
    deflation_factor: 0.36
    multi_sim_ratio: 2.8
  
  # Ghana: Moderate multi-SIM ratio
  GH:
    deflation_factor: 0.45
    multi_sim_ratio: 2.2
  
  # Kenya: High mobile money (M-Pesa) usage; dual SIMs common
  KE:
    deflation_factor: 0.40
    multi_sim_ratio: 2.5
  
  # Uganda: High multi-SIM ratio
  UG:
    deflation_factor: 0.38
    multi_sim_ratio: 2.6
  
  # Rwanda: Emerging market; lower multi-SIM ratio than regional peers
  RW:
    deflation_factor: 0.55
    multi_sim_ratio: 1.8
  
  # Default for unlisted countries
  DEFAULT:
    deflation_factor: 0.50
    multi_sim_ratio: 2.0
