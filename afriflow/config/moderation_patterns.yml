# Moderation Patterns
# Configuration for the Lekgotla automated content moderation system.
#
# Disclaimer: Portfolio project by Thabo Kunene. Not a
# Standard Bank Group product. All data is simulated.

# Patterns that indicate potential leaks of internal-only bank identifiers
# or sensitive regulatory codes that should not be discussed in open threads.
internal_ids:
  # Matches common internal project code formats
  - "PRJ-[0-9]{5}"
  # Matches internal cost centre codes
  - "CC-[0-9]{4}"
  # Matches employee global identifiers
  - "EMP-[A-Z]{3}-[0-9]{4}"

# Patterns for identifying client-specific sensitive data such as
# account numbers, card numbers, or government identifiers.
pii_patterns:
  # Standard 16-digit card number pattern (basic check)
  - "[0-9]{4}-[0-9]{4}-[0-9]{4}-[0-9]{4}"
  # South African ID number pattern (13 digits)
  - "[0-9]{13}"
  # Generic account number pattern (10-12 digits)
  - "[0-9]{10,12}"

# Keywords that trigger an automatic "unprofessional" flag.
# These words are excluded from all peer-to-peer discussions.
blocked_keywords:
  - "confidential"  # Redundant but often misused
  - "internal_only"
  - "top_secret"
  - "leaked"
  - "unverified"

# Patterns that suggest the user is posting a regulatory alert.
# These are automatically prioritised for compliance officer review.
regulatory_keywords:
  - "SAR"           # Suspicious Activity Report
  - "AML"           # Anti-Money Laundering
  - "KYC"           # Know Your Customer
  - "POPIA"         # Protection of Personal Information Act
  - "GDPR"          # General Data Protection Regulation
  - "SANCTION"      # Sanctions list matches
