repos:
  - repo: local
    hooks:
      - id: check-domain-imports
        name: Check domain import convention
        entry: python afriflow/scripts/check_imports.py --check --path domains
        language: system
        files: ^afriflow/domains/.*\.py$
      - id: validate-targeted-coverage
        name: Validate module-specific coverage (forex + flow drift)
        entry: python afriflow/scripts/precommit_coverage_check.py
        language: system
        pass_filenames: false
