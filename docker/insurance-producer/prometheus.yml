# Prometheus configuration for AfriFlow Insurance Kafka Producer

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape the insurance producer metrics
  - job_name: 'insurance-producer'
    static_configs:
      - targets: ['insurance-producer:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Scrape Kafka broker metrics
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']

  # Scrape Schema Registry metrics
  - job_name: 'schema-registry'
    static_configs:
      - targets: ['schema-registry:8081']

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Alerting rules
rule_files:
  - "alerts.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
